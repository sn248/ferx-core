name: Security audit

# Runs `cargo audit` (RUSTSEC advisory DB) against the committed Cargo.lock.
# Kept off the per-PR critical path (only fires when dependency files change,
# weekly, or on demand) so a newly-published advisory can't block unrelated
# PRs, while still catching vulnerable dependencies promptly when the lockfile
# changes. Scheduled runs open a tracking issue for any new advisory.

on:
  push:
    branches: [main]
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/audit.yml'
  pull_request:
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
  schedule:
    - cron: '0 7 * * 1'   # Mondays 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  checks: write

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    # rust-toolchain.toml pins nightly, but cargo-audit doesn't need it.
    # Override to stable so the action's `cargo install cargo-audit` /
    # `cargo audit` run on the stable toolchain preinstalled on ubuntu-latest.
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
