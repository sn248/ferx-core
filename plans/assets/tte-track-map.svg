<svg xmlns="http://www.w3.org/2000/svg" width="720" viewBox="0 0 680 508" role="img" aria-label="TTE/Markov plan track map">
<title>TTE/Markov plan — track map</title>
<desc>The built generalized-NLL trunk feeds independent tracks (survival hardening, SAEM engine, custom likelihood), a thin discrete-state slice, and a matrix-exp module; the slice unlocks categorical and Markov/CTMM; HMM follows CTMM.</desc>
<style>
  text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:13px}
  .ts{font-size:11px}
  .th{font-weight:600}
  rect{stroke-width:1}
  .green>rect{fill:#EAF3DE;stroke:#639922}.green text{fill:#173404}
  .teal>rect{fill:#E1F5EE;stroke:#1D9E75}.teal text{fill:#04342C}
  .amber>rect{fill:#FAEEDA;stroke:#BA7517}.amber text{fill:#412402}
  .purple>rect{fill:#EEEDFE;stroke:#7F77DD}.purple text{fill:#26215C}
  .gray>rect{fill:#F1EFE8;stroke:#888780}.gray text{fill:#2C2C2A}
  line{stroke:#888780;stroke-width:1}
</style>
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<line x1="133" y1="98" x2="133" y2="129" marker-end="url(#a)"/>
<line x1="340" y1="98" x2="340" y2="129" marker-end="url(#a)"/>
<line x1="547" y1="98" x2="547" y2="129" marker-end="url(#a)"/>
<line x1="236" y1="98" x2="236" y2="215" marker-end="url(#a)"/>
<line x1="443" y1="98" x2="443" y2="215" marker-end="url(#a)"/>
<line x1="165" y1="274" x2="165" y2="297" marker-end="url(#a)"/>
<line x1="390" y1="274" x2="390" y2="297" marker-end="url(#a)"/>
<line x1="536" y1="274" x2="536" y2="297" marker-end="url(#a)"/>
<line x1="500" y1="360" x2="500" y2="395" marker-end="url(#a)"/>

<g class="green"><rect x="40" y="50" width="600" height="48" rx="8"/><text class="th" x="340" y="73" text-anchor="middle">Generalized-NLL trunk — built (Phase 1)</text><text class="ts" x="340" y="89" text-anchor="middle">endpoint dispatch · FD-Hessian + log-det · SimOutcome</text></g>

<g class="teal"><rect x="40" y="131" width="186" height="54" rx="6"/><text class="th" x="133" y="157" text-anchor="middle">Survival hardening</text><text class="ts" x="133" y="174" text-anchor="middle">A · 6 issues + docs</text></g>
<g class="teal"><rect x="247" y="131" width="186" height="54" rx="6"/><text class="th" x="340" y="157" text-anchor="middle">SAEM engine</text><text class="ts" x="340" y="174" text-anchor="middle">B · f-SAEM (3b)</text></g>
<g class="teal"><rect x="454" y="131" width="186" height="54" rx="6"/><text class="th" x="547" y="157" text-anchor="middle">Custom likelihood</text><text class="ts" x="547" y="174" text-anchor="middle">E · [ll_model] (Ph 8)</text></g>

<g class="amber"><rect x="40" y="217" width="372" height="57" rx="6"/><text class="th" x="226" y="243" text-anchor="middle">Phase 4.0 · discrete-state slice</text><text class="ts" x="226" y="260" text-anchor="middle">thin shared foundation — unlocks C + D</text></g>
<g class="teal"><rect x="432" y="217" width="208" height="57" rx="6"/><text class="th" x="536" y="243" text-anchor="middle">Matrix-exp module</text><text class="ts" x="536" y="260" text-anchor="middle">zero-dep · start now</text></g>

<g class="purple"><rect x="40" y="299" width="250" height="61" rx="6"/><text class="th" x="165" y="325" text-anchor="middle">Categorical &amp; count</text><text class="ts" x="165" y="342" text-anchor="middle">C · binary · ordinal · Poisson · NB</text></g>
<g class="purple"><rect x="360" y="299" width="280" height="61" rx="6"/><text class="th" x="500" y="325" text-anchor="middle">Markov / CTMM</text><text class="ts" x="500" y="342" text-anchor="middle">D · DTMM → mCTMM → CTMM → drug-Q</text></g>

<g class="gray"><rect x="360" y="397" width="280" height="52" rx="6"/><text class="th" x="500" y="420" text-anchor="middle">Phase 7 · HMM</text><text class="ts" x="500" y="437" text-anchor="middle">needs CTMM + new inner-EM</text></g>

<g class="green"><rect x="40" y="470" width="74" height="20" rx="10"/><text class="ts" x="77" y="484" text-anchor="middle">built</text></g>
<g class="teal"><rect x="124" y="470" width="104" height="20" rx="10"/><text class="ts" x="176" y="484" text-anchor="middle">start now</text></g>
<g class="amber"><rect x="238" y="470" width="150" height="20" rx="10"/><text class="ts" x="313" y="484" text-anchor="middle">foundation slice</text></g>
<g class="purple"><rect x="398" y="470" width="120" height="20" rx="10"/><text class="ts" x="458" y="484" text-anchor="middle">needs slice</text></g>
<g class="gray"><rect x="528" y="470" width="96" height="20" rx="10"/><text class="ts" x="576" y="484" text-anchor="middle">deferred</text></g>
</svg>
