name: Slow tests

# Heavy fit-based regression tests (each runs a real FOCEI / GN-hybrid / EKF
# population fit) that take 5–60 min on a 2-core ubuntu-latest runner. The
# main CI workflow `#[ignore]`s them via `#[cfg_attr(not(feature = "slow-tests"), ignore)]`.
# This workflow runs them on a schedule + on-demand so they can't block
# pull-request merges but still get exercised regularly against `main`.

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:       # manual trigger
  push:
    branches: [main]
    paths:
      # Re-run when something touches the code that the heavy fits exercise.
      # `src/ode/solver.rs` is in the list because the EKF in `src/ode/ekf.rs`
      # uses `solve_ode` from it — a change to the integrator otherwise
      # wouldn't trigger this workflow until the next scheduled run.
      - 'src/api.rs'
      - 'src/estimation/**'
      - 'src/ode/ekf.rs'
      - 'src/ode/predictions.rs'
      - 'src/ode/solver.rs'
      # The parser compiles every model the heavy fits run, so a change to model
      # compilation (e.g. the structural-param binding in #261) can shift a fit's
      # objective or break it outright — including the NONMEM-anchored slow test
      # in tests/structural_param_nonmem.rs.
      - 'src/parser/**'
      - 'src/stats/likelihood.rs'

env:
  CARGO_TERM_COLOR: always
  RUSTUP_TOOLCHAIN: nightly
  RAYON_NUM_THREADS: 1

jobs:
  slow-tests:
    name: Slow regression tests
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7
      - name: Install nightly toolchain
        run: rustup toolchain install nightly --profile minimal

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-slow
      - name: cargo test (ci-test profile + slow-tests)
        # `--profile ci-test` (defined in Cargo.toml) keeps release-level
        # optimisation so the heavy fits run fast, but drops fat LTO — the
        # whole-program link tax that otherwise dominates this build.
        #
        # `--lib` is intentionally omitted so integration tests in `tests/`
        # are compiled and run here. Gated slow tests (the `slow-tests` feature
        # removes their `#[ignore]`) and ungated integration tests both execute.
        #
        # `--no-fail-fast` keeps cargo running every test binary even after one
        # fails. Without it, cargo aborts at the first failed binary and the
        # remaining ~15 integration-test binaries (alphabetically after the
        # failing one) silently never run, masking concurrent regressions.
        #
        # `survival` is included so the Phase 1 TTE Tier-3 tests
        # (`tests/tte_convergence.rs`, gated on BOTH `survival` and `slow-tests`)
        # actually execute here — the ci.yml `survival` job runs the TTE *smoke*
        # tests but not the slow convergence/SSE fits.
        run: cargo test --no-default-features --features ci,survival,slow-tests --profile ci-test --no-fail-fast
